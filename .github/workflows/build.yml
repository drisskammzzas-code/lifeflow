name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Select Xcode Version
      run: sudo xcode-select -s /Applications/Xcode_15.4.app

    - name: Build Xcode Project (Unsigned)
      run: |
        xcodebuild -project LifeFlow.xcodeproj \
                   -target LifeFlow \
                   -sdk iphoneos \
                   -configuration Release \
                   SYMROOT=build \
                   CODE_SIGNING_ALLOWED=NO \
                   CODE_SIGNING_REQUIRED=NO \
                   CODE_SIGN_IDENTITY="" \
                   clean build

    - name: Package IPA
      run: |
        mkdir -p Payload
        cp -r build/Release-iphoneos/LifeFlow.app Payload/
        zip -r LifeFlow.ipa Payload

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LifeFlow-App
        path: LifeFlow.ipa
